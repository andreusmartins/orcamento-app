<div class="p-4 max-w-lg mx-auto">

  <div class="flex justify-between items-center mb-6">
    <h1 class="text-xl font-semibold text-gray-800">Clientes</h1>
    <button (click)="abrirFormulario()"
            class="bg-blue-600 text-white rounded-xl px-4 py-2 text-sm font-medium hover:bg-blue-700 transition-colors">
      + Novo
    </button>
  </div>

  <!-- Formulário -->
  <div *ngIf="mostrarFormulario"
       class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 mb-4">

    <h2 class="text-base font-medium text-gray-700 mb-4">
      {{ editando ? 'Editar cliente' : 'Novo cliente' }}
    </h2>

    <input [(ngModel)]="form.nome"
           placeholder="Nome completo"
           class="w-full border border-gray-200 rounded-xl p-3 text-sm mb-3 focus:outline-none focus:ring-2 focus:ring-blue-200"/>

    <input [(ngModel)]="form.telefone"
           (input)="formatarTelefone($event)"
           placeholder="Telefone"
           class="w-full border border-gray-200 rounded-xl p-3 text-sm mb-3 focus:outline-none focus:ring-2 focus:ring-blue-200"/>

    <input [(ngModel)]="form.endereco"
           placeholder="Endereço (opcional)"
           class="w-full border border-gray-200 rounded-xl p-3 text-sm mb-4 focus:outline-none focus:ring-2 focus:ring-blue-200"/>

    <div class="flex gap-3">
      <button (click)="cancelar()"
              class="flex-1 border border-gray-200 text-gray-600 rounded-xl p-3 text-sm hover:bg-gray-50 transition-colors">
        Cancelar
      </button>
      <button (click)="salvar()" [disabled]="carregando || !form.nome || !form.telefone"
              class="flex-1 bg-blue-600 text-white rounded-xl p-3 text-sm font-medium disabled:opacity-50 hover:bg-blue-700 transition-colors">
        {{ carregando ? 'Salvando...' : 'Salvar' }}
      </button>
    </div>
  </div>

  <!-- Lista vazia -->
  <div *ngIf="clientes.length === 0 && !mostrarFormulario"
       class="text-center py-16 text-gray-400">
    <div class="text-5xl mb-3">👥</div>
    <p class="text-sm">Nenhum cliente cadastrado ainda</p>
    <p class="text-sm">Toque em <strong>+ Novo</strong> para começar</p>
  </div>

  <!-- Lista de clientes -->
  <div *ngFor="let c of clientes"
       class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 mb-3">

    <div class="flex justify-between items-start">
      <div>
        <p class="font-medium text-gray-800">{{ c.nome }}</p>
        <p class="text-sm text-gray-500 mt-1">{{ c.telefone }}</p>
        <p *ngIf="c.endereco" class="text-sm text-gray-400">{{ c.endereco }}</p>
      </div>
      <div class="flex gap-3">
        <button (click)="editar(c)"
                class="text-blue-400 text-sm hover:text-blue-600">
          editar
        </button>
        <button (click)="deletar(c.id!)"
                class="text-red-400 text-sm hover:text-red-600">
          remover
        </button>
      </div>
    </div>

    <a [href]="whatsappLink(c)"
       target="_blank"
       class="mt-3 flex items-center gap-2 text-green-600 text-sm hover:text-green-700">
      <span>💬</span> Abrir WhatsApp
    </a>
  </div>

</div>
