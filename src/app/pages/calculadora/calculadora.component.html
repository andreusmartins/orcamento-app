<div class="p-4 max-w-lg mx-auto">

  <div class="flex justify-between items-center mb-6">
    <h1 class="text-xl font-semibold text-gray-800">Calculadora</h1>
    <button (click)="copiarResultado()"
            class="border border-gray-200 bg-white text-gray-600 rounded-xl px-3 py-2 text-sm hover:bg-gray-50 transition-colors">
      {{ copiado ? 'Copiado' : 'Copiar' }}
    </button>
  </div>

  <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 mb-4">
    <div class="bg-gray-950 rounded-2xl p-4 mb-4 min-h-28 flex flex-col justify-end">
      <div class="h-6 text-right text-sm text-gray-400 truncate">
        {{ expressaoAtual || ' ' }}
      </div>
      <div class="text-right text-4xl font-semibold text-white break-all">
        {{ visor }}
      </div>
    </div>

    <div class="grid grid-cols-4 gap-2">
      <ng-container *ngFor="let linha of botoes">
        <button *ngFor="let botao of linha"
                (click)="pressionar(botao)"
                [ngClass]="{
                  'col-span-2': botao === '0',
                  'bg-blue-600 text-white hover:bg-blue-700': botao === '=' || botao === '+' || botao === '-' || botao === '*' || botao === '/',
                  'bg-gray-100 text-gray-800 hover:bg-gray-200': botao !== '=' && botao !== '+' && botao !== '-' && botao !== '*' && botao !== '/',
                  'bg-amber-100 text-amber-700 hover:bg-amber-200': botao === 'C'
                }"
                class="h-14 rounded-xl text-lg font-semibold transition-colors">
          {{ botao === '*' ? 'x' : botao }}
        </button>
      </ng-container>
    </div>
  </div>

  <div class="bg-blue-50 rounded-2xl p-4 mb-4">
    <div class="flex justify-between items-center gap-3">
      <div>
        <p class="text-sm text-gray-500">Resultado atual</p>
        <p class="text-2xl font-semibold text-blue-700">R$ {{ visor }}</p>
      </div>
      <button (click)="copiarResultado()"
              class="bg-blue-600 text-white rounded-xl px-4 py-3 text-sm font-medium hover:bg-blue-700 transition-colors">
        Copiar valor
      </button>
    </div>
  </div>

  <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4">
    <div class="flex justify-between items-center mb-3">
      <h2 class="text-base font-medium text-gray-700">Historico</h2>
      <button *ngIf="historico.length > 0"
              (click)="limparHistorico()"
              class="text-sm text-gray-400 hover:text-red-500">
        limpar
      </button>
    </div>

    <div *ngIf="historico.length === 0" class="text-sm text-gray-400 py-4 text-center">
      Nenhum calculo feito ainda
    </div>

    <button *ngFor="let item of historico"
            (click)="usarResultadoNoVisor(item.resultado)"
            class="w-full flex justify-between items-center border-t border-gray-100 py-3 text-left hover:bg-gray-50">
      <span class="text-sm text-gray-500">{{ item.expressao }}</span>
      <span class="text-base font-semibold text-gray-800">{{ item.resultado }}</span>
    </button>
  </div>

</div>
