<div class="min-h-screen bg-blue-600 flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl shadow-xl w-full max-w-sm p-8">

    <!-- Logo / Título -->
    <div class="text-center mb-8">
      <div class="text-5xl mb-3">🏠</div>
      <h1 class="text-2xl font-bold text-gray-800">Bem-vindo!</h1>
      <p class="text-gray-500 mt-1">Entre com seus dados para acessar</p>
    </div>

    <!-- Formulário -->
    <form (ngSubmit)="entrar()" #f="ngForm">

      <!-- Email -->
      <div class="mb-5">
        <label class="block text-gray-700 font-semibold mb-2 text-lg">📧 Email</label>
        <input
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder="seu@email.com"
          class="w-full border-2 border-gray-200 rounded-xl px-4 py-4 text-lg focus:border-blue-500 focus:outline-none"
          autocomplete="email"
        />
      </div>

      <!-- Senha -->
      <div class="mb-6">
        <label class="block text-gray-700 font-semibold mb-2 text-lg">🔑 Senha</label>
        <input
          type="password"
          [(ngModel)]="senha"
          name="senha"
          placeholder="Sua senha"
          class="w-full border-2 border-gray-200 rounded-xl px-4 py-4 text-lg focus:border-blue-500 focus:outline-none"
          autocomplete="current-password"
        />
      </div>

      <!-- Erro -->
      @if (erro) {
        <div class="bg-red-100 text-red-700 rounded-xl px-4 py-3 mb-4 text-center font-semibold">
          ⚠️ {{ erro }}
        </div>
      }

      <!-- Botão Entrar -->
      <button
        type="submit"
        [disabled]="carregando"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl text-xl transition-colors disabled:opacity-60"
      >
        @if (carregando) {
          ⏳ Entrando...
        } @else {
          ✅ Entrar
        }
      </button>

    </form>

    <p class="text-center text-gray-400 text-sm mt-6">
      Problemas para entrar? Fale com o administrador.
    </p>

    <div *ngIf="mostrarDicaSenha" class="bg-blue-50 border border-blue-200 rounded-xl p-4 mt-4 text-sm text-blue-700 text-center">
      💡 Entre em contato com o administrador do sistema para redefinir sua senha. Ele pode alterar pelo painel de administração.
    </div>

    <button (click)="mostrarDicaSenha = !mostrarDicaSenha"
            class="w-full text-blue-500 text-sm mt-3 hover:text-blue-700 underline">
      Esqueci minha senha
    </button>
  </div>
</div>
