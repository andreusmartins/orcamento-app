<header class="bg-blue-600 text-white px-4 py-3 flex items-center justify-between shadow">
  <div class="flex items-center gap-2">
    <span class="text-xl">🏠</span>
    <span class="font-bold text-lg">Orçamentos</span>
  </div>

  @if (auth.isLogado()) {
    <div class="flex items-center gap-3">
      @if (auth.isAdmin()) {
        <a routerLink="/admin"
          class="text-xs bg-yellow-400 text-yellow-900 font-bold px-2 py-1 rounded-full">
          ⚙️ Admin
        </a>
      }
      <span class="text-blue-200 text-sm hidden sm:block">{{ auth.getUsuario()?.nome }}</span>
      <button (click)="sair()"
        class="bg-white bg-opacity-20 hover:bg-opacity-30 text-white text-sm font-semibold px-3 py-1.5 rounded-lg transition-colors">
        Sair
      </button>
    </div>
  }
</header>
